<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rpc.css">
</head>
<body>
<h1>Rock Paper Scissors</h1>
<button class="game rock-button">✊</button>
<button class="game paper-button">✋</button>
<button class="game scissors-button">✌️</button>


<p class="you"></p>
<p class="results"></p>
<p class="step"></p>
<button class="reset" onclick="
score.wins=0; score.losses=0; score.ties=0; localStorage.removeItem('score'); updateScore();">
    Reset Score
</button>
<button class="reset" onclick="
autoPlay();

">Auto Play</button>

<script src="rpc.js">
</script>
</body>
</html>
